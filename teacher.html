<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS | Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- ================= SIDEBAR ================= -->

<aside class="sidebar">

    <div class="brand">
        <div class="logo">SMS</div>

        <div>
            <h2>Teacher</h2>
            <p class="muted">Dashboard</p>
        </div>
    </div>

    <nav class="nav">

        <a class="nav-item active" data-section="attendance">
            Attendance
        </a>

        <a class="nav-item" data-section="grade">
            Grade
        </a>

        <a class="nav-item" data-section="profile">
            My Profile
        </a>

    </nav>

    <div class="sidebar-footer">
        <button class="btn btn-ghost" id="logoutBtn">Logout</button>
    </div>

</aside>


<!-- ================= SCRIPT ================= -->

<script type="module">

import { checkSession, signOut } from './auth.js'
import { supabase, supabaseUrl, supabaseAnonKey } from './supabase.js'


/* ================= GLOBAL VARIABLES ================= */

let currentTeacherId = null
let currentTeacherEmail = null
let currentStudents = []
let teacherSubjectValue = null
let statusEnumValues = []

const TODAY = new Date().toISOString().split('T')[0]


/* ================= DASHBOARD NAVIGATION ================= */

document.addEventListener("DOMContentLoaded", () => {

    const navItems = document.querySelectorAll(".nav-item")
    const sections = document.querySelectorAll(".dashboard-section")

    function showSection(id) {

        sections.forEach(section => {
            section.style.display = "none"
        })

        document.getElementById(id).style.display = "flex"

        navItems.forEach(n => n.classList.remove("active"))

        document
            .querySelector(`[data-section="${id}"]`)
            .classList.add("active")
    }

    navItems.forEach(item => {
        item.addEventListener("click", () => {
            showSection(item.dataset.section)
        })
    })

    showSection("attendance")

})


/* ================= SESSION ================= */

checkSession().then(async session => {

    if (session && session.user) {

        currentTeacherId = session.user.id
        currentTeacherEmail = session.user.email

        await loadStatusEnum()
        await loadSubjectEnums()
        await loadTeacherProfile(currentTeacherId)

        initTeacherDashboard()
    }

})


/* ================= LOGOUT ================= */

document
    .getElementById("logoutBtn")
    .addEventListener("click", () => {
        signOut()
    })


/* ================= STATUS ENUM ================= */

async function loadStatusEnum() {

    try {

        const resp = await fetch(
            `${supabaseUrl}/rest/v1/?apikey=${supabaseAnonKey}`
        )

        const spec = await resp.json()

        const statusProp =
            spec.definitions?.attendance?.properties?.status

        if (statusProp?.enum) {
            statusEnumValues = statusProp.enum
        }

    }
    catch {

        statusEnumValues = ['present', 'absent', 'late']

    }

}


/* ================= SUBJECT ENUM ================= */

async function loadSubjectEnums() {

    const select = document.getElementById("teacherSubject")

    try {

        const resp = await fetch(
            `${supabaseUrl}/rest/v1/?apikey=${supabaseAnonKey}`
        )

        const spec = await resp.json()

        const subjectProp =
            spec.definitions?.teacher?.properties?.subject

        if (subjectProp?.enum) {

            select.innerHTML =
                '<option value="">Select Subject</option>'

            subjectProp.enum.forEach(val => {

                const opt = document.createElement("option")

                opt.value = val
                opt.textContent = val

                select.appendChild(opt)

            })

        }

    } catch {}

}


/* ================= TEACHER PROFILE ================= */

async function loadTeacherProfile(userId) {

    const { data } = await supabase
        .from("teacher")
        .select("subject,phone_number")
        .eq("teacher_id", userId)
        .maybeSingle()

    if (data) {

        teacherSubjectValue = data.subject

        document.getElementById("teacherSubject").value =
            data.subject || ""

        document.getElementById("teacherPhone").value =
            data.phone_number || ""

    }

    document.getElementById("teacherEmailBadge").textContent =
        currentTeacherEmail || "Teacher"

    document.getElementById("teacherSubjectBadge").textContent =
        teacherSubjectValue
            ? `Subject: ${teacherSubjectValue}`
            : "Subject: Not Set"

}


/* ================= ATTENDANCE ================= */

async function initTeacherDashboard() {

    const tbody = document.getElementById("attendanceTbody")

    const saveBtn =
        document.getElementById("saveAttendanceBtn")

    document.getElementById("attendanceDateDisplay").value = TODAY

    document.getElementById("attendanceSubjectDisplay").value =
        teacherSubjectValue || "Update profile first"


    const { data: students } = await supabase
        .from("student")
        .select("*")
        .order("roll_number")

    currentStudents = students || []


    if (currentStudents.length === 0) {

        tbody.innerHTML =
            '<tr><td colspan="4">No students</td></tr>'

        return

    }


    const statusOptions =
        statusEnumValues
            .map(v => `<option>${v}</option>`)
            .join("")

    tbody.innerHTML = ""


    currentStudents.forEach(student => {

        const tr = document.createElement("tr")

        tr.innerHTML = `

            <td>${student.roll_number || "-"}</td>
            <td>${student.name || "Unnamed"}</td>

            <td>
                <select class="attendance-select"
                        data-id="${student.profile_id}">
                        ${statusOptions}
                </select>
            </td>

            <td>
                <input class="attendance-remarks"
                       placeholder="Remark">
            </td>

        `

        tbody.appendChild(tr)

    })


    saveBtn.disabled = false


    document
        .getElementById("attendanceForm")
        .addEventListener("submit", async (e) => {

            e.preventDefault()

            const selects =
                document.querySelectorAll(".attendance-select")

            const remarks =
                document.querySelectorAll(".attendance-remarks")

            const payload =
                Array.from(selects).map((select, i) => ({

                    student_id: select.dataset.id,
                    date: TODAY,
                    recorded_by: currentTeacherId,
                    subject: teacherSubjectValue,
                    remarks: remarks[i].value || null,
                    status: select.value

                }))

            const { error } =
                await supabase
                    .from("attendance")
                    .insert(payload)

            if (error) {

                alert(error.message)

            } else {

                alert("Attendance saved!")

            }

        })

}

</script>


<!-- ================= MAIN ================= -->

<main class="main">

    <header class="topbar">

    <div>
        <h1>Welcome, Teacher</h1>
        <p class="muted">Manage attendance and profile</p>
    </div>

    <div class="topbar-actions">

      <span class="badge" id="teacherEmailBadge">
        Loading...
      </span>

      <span class="badge" id="teacherSubjectBadge">
        Subject: Loading...
      </span>

    </div>

    </header>


    <section class="grid">

<!-- ================= ATTENDANCE ================= -->

    <section id="attendance"
      class="card span-12 dashboard-section">

      <div class="card-head">

        <h3>Attendance</h3>

          <p class="muted">
            Mark student attendance
          </p>

      </div>

      <div class="form-row">

        <div class="field">
          <label>Date</label>
              <input id="attendanceDateDisplay" readonly>
        </div>

      <div class="field">
            <label>Subject</label>
              <input id="attendanceSubjectDisplay" readonly>
        </div>

      </div>

    <form id="attendanceForm" style="margin-top: 24px;">

        <div class="table-wrap">

      <table>

        <thead>

          <tr>
              <th>Roll No</th>
              <th>Name</th>
              <th>Status</th>
              <th>Remarks</th>
          </tr>

        </thead>

        <tbody id="attendanceTbody">

          <tr>
              <td colspan="4">Loading...</td>
          </tr>

        </tbody>

      </table>

    </div>

  <button
      class="btn btn-primary"
      id="saveAttendanceBtn"
      style="margin-top:12px"
      disabled>

      Save Attendance

  </button>

</form>

</section>


<!-- ================= GRADE ================= -->

<section id="grade"
    class="card span-12 dashboard-section">

    <div class="card-head">

        <h3>Grade</h3>

        <p class="muted">
        The grading module will be available soon
        </p>

    </div>

</section>


<!-- ================= PROFILE ================= -->

<section id="profile"
      class="card span-12 dashboard-section">

      <div class="card-head">
          <h3>My Profile</h3>
      </div>

      <div class="form">

            <div class="form-row">

                  <div class="field">
                      <label>Subject</label>
                        <select id="teacherSubject"></select>
                  </div>

                  <div class="field">
                      <label>Phone</label>
                        <input id="teacherPhone">
                  </div>

            </div>

          <button class="btn btn-primary" id="saveProfileBtn">
            Save Profile
          </button>

      </div>

</section>

</section>

</main>

</div>

</body>
</html>
