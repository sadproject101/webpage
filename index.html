<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMS | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Student Management System</h1>
      <p>Login to continue</p>
    </div>

    <!-- Static login (for demo): use these links below to open dashboards -->
    <form class="auth-form">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" required />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" required />

      <button type="button" class="btn btn-primary">Login</button>

      <div class="demo-links">
        <p class="muted">Demo navigation:</p>
        <div class="link-row">
          <a class="chip" href="student.html">Student</a>
          <a class="chip" href="parent.html">Parent</a>
          <a class="chip" href="teacher.html">Teacher</a>
        </div>
      </div>
    </form>

    <p class="auth-footer muted">
      © 2026 Student Management System • HTML/CSS Prototype
    </p>
  </div>
</body>
</html>
