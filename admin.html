<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .action-btns {
            display: flex;
            gap: 8px;
        }

        .edit-row {
            background: rgba(91, 124, 250, 0.1) !important;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div>
                <div class="brand">
                    <div class="logo">A</div>
                    <h2>Admin Panel</h2>
                </div>
                <div class="nav" style="margin-top: 20px;">
                    <a href="admin.html" class="nav-item active">Manage Students</a>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-ghost btn-small" style="color: var(--muted);">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <div class="topbar">
                <div>
                    <h1>Manage Students</h1>
                    <p class="muted">Create, read, update, and delete student records.</p>
                </div>
                <div class="topbar-actions">
                    <button id="addStudentBtn" class="btn btn-primary">+ Add New Student</button>
                    <span class="badge">Role: Admin</span>
                </div>
            </div>

            <div class="grid">
                <div class="card span-12">
                    <div class="card-head">
                        <h3>Student List</h3>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Roll No</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>DOB</th>
                                    <th>Gender</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody">
                                <tr>
                                    <td colspan="6" style="text-align:center">Loading students...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Student Form Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom: 16px;">Add Student</h3>
            <form id="studentForm" class="form">
                <input type="hidden" id="editProfileId" />
                <div class="form-row">
                    <div class="field">
                        <label>Name</label>
                        <input type="text" id="sName" required />
                    </div>
                    <div class="field">
                        <label>Roll Number</label>
                        <input type="number" id="sRoll" required />
                    </div>
                </div>
                <div class="form-row">
                    <div class="field">
                        <label>Phone</label>
                        <input type="number" id="sPhone" />
                    </div>
                    <div class="field">
                        <label>Date of Birth</label>
                        <input type="date" id="sDob" />
                    </div>
                </div>
                <div class="field" style="margin-bottom: 16px;">
                    <label>Gender</label>
                    <select id="sGender">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" id="closeModalBtn" class="btn btn-outline">Cancel</button>
                    <button type="submit" id="saveStudentBtn" class="btn btn-primary">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { checkSession, signOut } from './auth.js'
        import { supabase } from './supabase.js'

        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession()

            document.getElementById('logoutBtn').addEventListener('click', signOut)

            const tbody = document.getElementById('studentTableBody')
            const modal = document.getElementById('studentModal')
            const form = document.getElementById('studentForm')

            // Load Students
            async function loadStudents() {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Loading...</td></tr>'
                const { data, error } = await supabase.from('student').select('*').order('roll_number')

                if (error) {
                    tbody.innerHTML = `<tr><td colspan="6" class="error-text">Error: ${error.message}</td></tr>`
                    return
                }

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No students found.</td></tr>'
                    return
                }

                tbody.innerHTML = ''
                data.forEach(student => {
                    const tr = document.createElement('tr')
                    tr.innerHTML = `
                        <td>${student.roll_number || '-'}</td>
                        <td>${student.name || '-'}</td>
                        <td>${student.phone_num || '-'}</td>
                        <td>${student.date_of_birth || '-'}</td>
                        <td>${student.gender || '-'}</td>
                        <td class="action-btns">
                            <button class="btn btn-small btn-outline edit-btn" data-id="${student.profile_id}">Edit</button>
                            <button class="btn btn-small btn-outline del-btn" style="color:#ff5b5b; border-color:rgba(255,91,91,0.3)" data-id="${student.profile_id}">Delete</button>
                        </td>
                    `
                    tbody.appendChild(tr)
                })

                // Attach event listeners to new buttons
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => openEditModal(e.target.dataset.id, data))
                })
                document.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => deleteStudent(e.target.dataset.id))
                })
            }

            // Modal Logic
            document.getElementById('addStudentBtn').addEventListener('click', () => {
                form.reset()
                document.getElementById('editProfileId').value = ''
                document.getElementById('modalTitle').textContent = 'Add Student'
                modal.classList.add('active')
            })

            document.getElementById('closeModalBtn').addEventListener('click', () => {
                modal.classList.remove('active')
            })

            function openEditModal(id, allData) {
                const student = allData.find(s => s.profile_id === id)
                if (!student) return

                document.getElementById('editProfileId').value = student.profile_id
                document.getElementById('sName').value = student.name || ''
                document.getElementById('sRoll').value = student.roll_number || ''
                document.getElementById('sPhone').value = student.phone_num || ''
                document.getElementById('sDob').value = student.date_of_birth || ''
                document.getElementById('sGender').value = student.gender || ''

                document.getElementById('modalTitle').textContent = 'Edit Student'
                modal.classList.add('active')
            }

            // Save / Create Student
            form.addEventListener('submit', async (e) => {
                e.preventDefault()
                const saveBtn = document.getElementById('saveStudentBtn')
                saveBtn.disabled = true
                saveBtn.textContent = 'Saving...'

                const profileId = document.getElementById('editProfileId').value

                const payload = {
                    name: document.getElementById('sName').value,
                    roll_number: document.getElementById('sRoll').value,
                    phone_num: document.getElementById('sPhone').value || null,
                    date_of_birth: document.getElementById('sDob').value || null,
                    gender: document.getElementById('sGender').value || null
                }

                try {
                    let error;
                    if (profileId) {
                        // Update
                        const res = await supabase.from('student').update(payload).eq('profile_id', profileId)
                        error = res.error
                    } else {
                        // Create (Note: if profile_id is required via foreign key to auth.users, this might fail unless handled)
                        // Using a dummy UUID or letting DB generate if not strict, but usually it links to auth setup.
                        // Assuming profile_id can be auto-generated or left blank if not strict FK.
                        payload.profile_id = crypto.randomUUID() // fallback if no auth tie
                        const res = await supabase.from('student').insert([payload])
                        error = res.error
                    }

                    if (error) throw error

                    modal.classList.remove('active')
                    loadStudents()
                } catch (err) {
                    alert('Error saving student: ' + err.message)
                } finally {
                    saveBtn.disabled = false
                    saveBtn.textContent = 'Save Student'
                }
            })

            // Delete Student
            async function deleteStudent(id) {
                if (!confirm('Are you sure you want to delete this student?')) return

                try {
                    const { error } = await supabase.from('student').delete().eq('profile_id', id)
                    if (error) throw error
                    loadStudents()
                } catch (err) {
                    alert('Error deleting student: ' + err.message)
                }
            }

            // Initial load
            loadStudents()
        })
    </script>
</body>

</html>
